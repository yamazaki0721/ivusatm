<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事業参加詳細 - IVUSA人事タレントマネジメントシステム</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/club.css">
</head>
<body>
    <!-- サイドバー -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-users"></i> <span>IVUSA</span></h1>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>自分ページ</span>
            </a>
            <a href="club.html" class="nav-item active">
                <i class="fas fa-users-cog"></i>
                <span>クラブ管理</span>
            </a>
            <a href="project.html" class="nav-item">
                <i class="fas fa-project-diagram"></i>
                <span>プロジェクト管理</span>
            </a>
            <a href="index.html#headquarters" class="nav-item">
                <i class="fas fa-building"></i>
                <span>本部管理</span>
            </a>
            <a href="training.html" class="nav-item">
                <i class="fas fa-graduation-cap"></i>
                <span>研修メニュー</span>
            </a>
            <a href="training-management.html" class="nav-item">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>研修管理</span>
            </a>
            <a href="talent-search.html" class="nav-item">
                <i class="fas fa-search"></i>
                <span>人材検索</span>
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <div class="page-header">
            <h2 id="pageTitle"><i class="fas fa-briefcase"></i> 事業参加詳細</h2>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i> 戻る
                </button>
            </div>
        </div>

        <!-- 参加者リスト -->
        <div class="section-card">
            <div class="card-header">
                <h3><i class="fas fa-check-circle"></i> 参加者リスト</h3>
            </div>
            <div class="card-body">
                <div class="participation-detail-grid">
                    <!-- スタッフ会員 -->
                    <div class="detail-section">
                        <h4>スタッフ会員</h4>
                        <div id="staffParticipated" class="member-list">
                            <!-- JavaScriptで生成 -->
                        </div>
                    </div>
                    
                    <!-- メンバー会員 -->
                    <div class="detail-section">
                        <h4>メンバー会員</h4>
                        <div id="memberParticipated" class="member-list">
                            <!-- JavaScriptで生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 不参加者リスト -->
        <div class="section-card">
            <div class="card-header">
                <h3><i class="fas fa-times-circle"></i> 不参加者リスト</h3>
            </div>
            <div class="card-body">
                <div class="participation-detail-grid">
                    <!-- スタッフ会員 -->
                    <div class="detail-section">
                        <h4>スタッフ会員</h4>
                        <div id="staffNotParticipated" class="member-list">
                            <!-- JavaScriptで生成 -->
                        </div>
                    </div>
                    
                    <!-- メンバー会員 -->
                    <div class="detail-section">
                        <h4>メンバー会員</h4>
                        <div id="memberNotParticipated" class="member-list">
                            <!-- JavaScriptで生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="js/club-participation-detail.js"></script>
</body>
</html>
