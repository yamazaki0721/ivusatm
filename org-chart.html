<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組織図 - IVUSA人事タレントマネジメントシステム</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/org-chart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- サイドバー -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-user-tie"></i> IVUSA</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>自分ページ</span>
            </a>
            <a href="club.html" class="nav-item">
                <i class="fas fa-users-cog"></i>
                <span>クラブ管理</span>
            </a>
            <a href="project.html" class="nav-item">
                <i class="fas fa-project-diagram"></i>
                <span>プロジェクト管理</span>
            </a>
            <a href="org-chart.html" class="nav-item active">
                <i class="fas fa-building"></i>
                <span>本部管理</span>
            </a>
            <a href="talent-search.html" class="nav-item">
                <i class="fas fa-search"></i>
                <span>人材検索</span>
            </a>
            <a href="training.html" class="nav-item">
                <i class="fas fa-graduation-cap"></i>
                <span>研修メニュー</span>
            </a>
            <a href="training-management.html" class="nav-item">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>研修管理</span>
            </a>
        </nav>
    </div>

    <!-- メインコンテンツ -->
    <div class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-sitemap"></i> 組織図</h1>
            <div class="header-info">
                <span class="badge badge-club">東京クラブ</span>
                <span class="badge badge-role">スタッフ会員権限</span>
            </div>
        </div>

        <div class="org-controls">
            <button class="btn btn-primary" onclick="saveOrgChart()">
                <i class="fas fa-save"></i> 保存
            </button>
            <button class="btn btn-secondary" onclick="resetOrgChart()">
                <i class="fas fa-undo"></i> リセット
            </button>
        </div>

        <!-- 組織図エリア -->
        <div class="org-chart-container">
            <div id="orgChartArea" class="org-chart-area">
                <!-- 第一階層 -->
                <div class="layer layer-1">
                    <div class="position-box" data-layer="1" data-id="pos-1-1" draggable="false">
                        <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div class="member-info empty">
                                <i class="fas fa-user-plus"></i>
                                <span>メンバーをドロップ</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 接続線（第一→第二） -->
                <div class="connection-line vertical" style="top: 110px; left: 50%; width: 2px; height: 40px;"></div>
                <div class="connection-line horizontal" style="top: 150px; left: 20%; width: 60%; height: 2px;"></div>

                <!-- 第二階層 -->
                <div class="layer layer-2">
                    <div class="layer-group">
                        <div class="position-box" data-layer="2" data-id="pos-2-1" data-parent="pos-1-1" draggable="false">
                            <button class="btn-add" onclick="addPosition(2, 'pos-2-1')" title="右に追加">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button class="btn-delete" onclick="deletePosition('pos-2-1')" title="削除">
                                <i class="fas fa-times"></i>
                            </button>
                            <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                                <div class="member-info empty">
                                    <i class="fas fa-user-plus"></i>
                                    <span>メンバーをドロップ</span>
                                </div>
                            </div>
                        </div>
                        <div class="connection-line vertical child-connector" style="top: 100%; width: 2px; height: 40px;"></div>
                        <div class="connection-line horizontal child-connector-h" style="top: calc(100% + 40px); width: 100%; height: 2px;"></div>
                    </div>

                    <div class="layer-group">
                        <div class="position-box" data-layer="2" data-id="pos-2-2" data-parent="pos-1-1" draggable="false">
                            <button class="btn-add" onclick="addPosition(2, 'pos-2-2')" title="右に追加">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button class="btn-delete" onclick="deletePosition('pos-2-2')" title="削除">
                                <i class="fas fa-times"></i>
                            </button>
                            <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                                <div class="member-info empty">
                                    <i class="fas fa-user-plus"></i>
                                    <span>メンバーをドロップ</span>
                                </div>
                            </div>
                        </div>
                        <div class="connection-line vertical child-connector" style="top: 100%; width: 2px; height: 40px;"></div>
                        <div class="connection-line horizontal child-connector-h" style="top: calc(100% + 40px); width: 100%; height: 2px;"></div>
                    </div>

                    <div class="layer-group">
                        <div class="position-box" data-layer="2" data-id="pos-2-3" data-parent="pos-1-1" draggable="false">
                            <button class="btn-add" onclick="addPosition(2, 'pos-2-3')" title="右に追加">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button class="btn-delete" onclick="deletePosition('pos-2-3')" title="削除">
                                <i class="fas fa-times"></i>
                            </button>
                            <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                                <div class="member-info empty">
                                    <i class="fas fa-user-plus"></i>
                                    <span>メンバーをドロップ</span>
                                </div>
                            </div>
                        </div>
                        <div class="connection-line vertical child-connector" style="top: 100%; width: 2px; height: 40px;"></div>
                        <div class="connection-line horizontal child-connector-h" style="top: calc(100% + 40px); width: 100%; height: 2px;"></div>
                    </div>
                </div>

                <!-- 第三階層 -->
                <div class="layer layer-3">
                    <!-- pos-2-1の子要素 (2つ) -->
                    <div class="position-box" data-layer="3" data-id="pos-3-1" data-parent="pos-2-1" draggable="false">
                        <button class="btn-add" onclick="addPosition(3, 'pos-3-1')" title="右に追加">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn-delete" onclick="deletePosition('pos-3-1')" title="削除">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div class="member-info empty">
                                <i class="fas fa-user-plus"></i>
                                <span>メンバーをドロップ</span>
                            </div>
                        </div>
                    </div>
                    <div class="position-box" data-layer="3" data-id="pos-3-2" data-parent="pos-2-1" draggable="false">
                        <button class="btn-add" onclick="addPosition(3, 'pos-3-2')" title="右に追加">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn-delete" onclick="deletePosition('pos-3-2')" title="削除">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div class="member-info empty">
                                <i class="fas fa-user-plus"></i>
                                <span>メンバーをドロップ</span>
                            </div>
                        </div>
                    </div>

                    <!-- pos-2-2の子要素 (2つ) -->
                    <div class="position-box" data-layer="3" data-id="pos-3-3" data-parent="pos-2-2" draggable="false">
                        <button class="btn-add" onclick="addPosition(3, 'pos-3-3')" title="右に追加">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn-delete" onclick="deletePosition('pos-3-3')" title="削除">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div class="member-info empty">
                                <i class="fas fa-user-plus"></i>
                                <span>メンバーをドロップ</span>
                            </div>
                        </div>
                    </div>
                    <div class="position-box" data-layer="3" data-id="pos-3-4" data-parent="pos-2-2" draggable="false">
                        <button class="btn-add" onclick="addPosition(3, 'pos-3-4')" title="右に追加">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn-delete" onclick="deletePosition('pos-3-4')" title="削除">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div class="member-info empty">
                                <i class="fas fa-user-plus"></i>
                                <span>メンバーをドロップ</span>
                            </div>
                        </div>
                    </div>

                    <!-- pos-2-3の子要素 (2つ) -->
                    <div class="position-box" data-layer="3" data-id="pos-3-5" data-parent="pos-2-3" draggable="false">
                        <button class="btn-add" onclick="addPosition(3, 'pos-3-5')" title="右に追加">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn-delete" onclick="deletePosition('pos-3-5')" title="削除">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div class="member-info empty">
                                <i class="fas fa-user-plus"></i>
                                <span>メンバーをドロップ</span>
                            </div>
                        </div>
                    </div>
                    <div class="position-box" data-layer="3" data-id="pos-3-6" data-parent="pos-2-3" draggable="false">
                        <button class="btn-add" onclick="addPosition(3, 'pos-3-6')" title="右に追加">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn-delete" onclick="deletePosition('pos-3-6')" title="削除">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="box-content" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div class="member-info empty">
                                <i class="fas fa-user-plus"></i>
                                <span>メンバーをドロップ</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- メンバープール -->
        <div class="member-pool">
            <div class="pool-section">
                <h3><i class="fas fa-user-shield"></i> 班長候補</h3>
                <div id="leaderPool" class="pool-content"></div>
            </div>
            <div class="pool-section">
                <h3><i class="fas fa-user-tie"></i> スタッフ以上候補</h3>
                <div id="staffPool" class="pool-content"></div>
            </div>
        </div>
    </div>

    <script src="js/org-chart.js"></script>
</body>
</html>
